<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Test</title>
</head>
<body>
    <div>This is a random web site
        <br><br>
        Pretend this iframe is hidden:
        <br><br>
    </div>
    <iframe src="https://TODO" width="5%" height="5%" style="border: none;"></iframe>
    <div id="tokenDisplay" style="margin-top: 20px;">
    </div>
    <script>
        window.onmessage = function(event) {
            console.log('Received message:', event.data);
            if (event.data.token) {
                // decode JWT
                const tokenParts = event.data.token.split('.');
                if (tokenParts.length === 3) {
                    const payload = JSON.parse(atob(tokenParts[1]));
                    document.getElementById('tokenDisplay').innerHTML = `
                        <h3>The site sent me this token</h3>
                        <pre>${JSON.stringify(payload, null, 2)}</pre>
                    `;
                } else {
                    document.getElementById('tokenDisplay').innerHTML = '<p>Invalid token format.</p>';
                }
            }
        };
    </script>
</body>
</html>
